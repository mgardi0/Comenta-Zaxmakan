<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, shrink-to-fit=no">
    <title>کۆمێنتە زەخمەکان</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-purple: #7a28cb;
            --primary-blue: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-light: #f0f4f8;
            --transition-smooth: opacity 0.5s ease, visibility 0.5s ease;
        }

        html { -webkit-text-size-adjust: 100%; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Kufi Arabic', sans-serif; }

        body {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            background-color: #0a0a0a;
            color: var(--text-light);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .animated-bg {
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(122, 40, 203, 0.4), transparent 60%),
                        radial-gradient(circle at 80% 20%, rgba(0, 210, 255, 0.4), transparent 50%);
            animation: moveGradient 15s infinite alternate ease-in-out;
            z-index: -1; filter: blur(60px);
        }

        @keyframes moveGradient {
            0% { transform: translate(0, 0); }
            50% { transform: translate(5%, 10%); }
            100% { transform: translate(-5%, -5%); }
        }

        .screen {
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: var(--transition-smooth);
            padding: 20px;
        }

        .screen.active { opacity: 1; visibility: visible; }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px 25px;
            width: 95%; max-width: 500px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center; display: flex; flex-direction: column; justify-content: center;
            position: relative;
        }

        h1 { font-size: clamp(1.5rem, 6vw, 2.2rem); font-weight: 800; line-height: 1.6; background: linear-gradient(to right, #fff, #a3c2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .btn {
            background: linear-gradient(135deg, var(--primary-purple), var(--primary-blue));
            border: none; border-radius: 12px; padding: 15px 30px; color: white;
            font-size: 1.2rem; font-weight: 600; cursor: pointer; width: 100%; max-width: 250px; margin-top: 20px; transition: all 0.3s ease;
        }
        .btn:hover { box-shadow: 0 4px 20px rgba(0, 210, 255, 0.4); transform: translateY(-2px); }

        .question-header { color: var(--primary-blue); font-size: 1rem; font-weight: bold; margin-bottom: 15px; }
        
        .question-text { 
            font-size: clamp(1.2rem, 5vw, 1.6rem); 
            font-weight: 800; 
            line-height: 1.7; 
            margin-bottom: 30px; 
            color: #fff;
            text-align: right;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
        }

        .comment-box {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 16px;
            padding: 20px;
            font-size: clamp(1.1rem, 4.5vw, 1.4rem);
            line-height: 1.8;
            color: #e2e8f0;
            text-align: right;
            position: relative;
            display: none; /* شاردراوەیە سەرەتا */
        }

        .comment-box::before {
            content: "کۆمێنت:";
            display: block;
            font-size: 0.8rem;
            color: var(--primary-blue);
            margin-bottom: 8px;
            font-weight: bold;
        }

        /* ئەنیمەیشنی هاتنە ژوورەوەی کۆمێنت */
        .pop-in {
            display: block;
            animation: popInAnim 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popInAnim {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .end-text { font-size: 1.5rem; font-weight: bold; color: #2ecc71; line-height: 1.8; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="Iman Ahmadi - Xana miri - ایمان احمدی - خانه‌میری(MP3_320K).mp3" type="audio/mpeg">
    </audio>

    <div class="animated-bg"></div>

    <div id="screen-start" class="screen active">
        <div class="glass-card" style="align-items: center;">
            <button class="btn" id="startBtn">دەستپێکردن</button>
        </div>
    </div>

    <div id="screen-welcome" class="screen">
        <div class="glass-card">
            <h1 style="text-align: center;">فەرموون ئێوەو کۆمێنتە زەخمەکان</h1>
        </div>
    </div>

    <div id="screen-qa" class="screen">
        <div class="glass-card">
            <div class="question-header" id="qCounter">پرسیاری 1 / 10</div>
            <div class="question-text" id="displayQuestion">لێرە پرسیارەکە دەردەکەوێت</div>
            
            <div class="comment-box" id="displayComment">
                لێرە وەڵامەکە دەردەکەوێت
            </div>
        </div>
    </div>

    <div id="screen-end" class="screen">
        <div class="glass-card">
            <div class="end-text">کۆتایی پرسیارەکان<br>سوپاس بۆ بینینتان</div>
        </div>
    </div>

    <script>
        const bgMusic = document.getElementById('bgMusic');

        // داتای پرسیار و وەڵامەکان ڕێک بەو شێوەیەی داوات کردووە
        const data = [
            {
                q: "بۆچی خاوەن مۆلیدەکە لە کاتی بۆردومانەکەدا کارەبا نادات بە گەڕەک؟",
                a: [
                    "رەزیلن لۆیێ",
                    "تا درۆنەکا ماڵکانیان لێ دیار نەبیت",
                    "تاکو دوژمن نەمانبینی تۆپمان لی بدا",
                    "خۆی گران دەكا چونكە قەدریمان نەگرت",
                    "چونکە ڕۆشتو وەرناگرنەوە",
                    "چونکە بۆردومانەکە روناکمان دەکاتەوە"
                ]
            },
            {
                q: "وەزیر بۆچی لە سەرەتای شەڕدا بڕیاری دا دەوام ڕابگرێت؟",
                a: [
                    "هەتا مەعاش نەدا",
                    "لۆ وەی زۆرترین رۆژ بژین",
                    "دەی زانی شەڕەکە بە قوەت دەبی",
                    "بۆ ئەوەی لە دیمەنی شەڕ بێ بەش نەبین",
                    "یار دوورە ملی وەزیری بشکێ",
                    "هەتا نەمرین نەیزانی لە مارێش هەر دەمرین"
                ]
            },
            {
                q: "گەورەترین کێشەی خەڵک لە ئێستەدا چییە؟",
                a: [
                    "نازانین چ جلکێک بکرین",
                    "ئەگەر ئاوارە بوون چی لەبەرکەن",
                    "نەدیتنی کڕشەکانیان",
                    "گرانبوونی ئەندۆمیە",
                    "بەس برسی نەبین",
                    "شەحنی مۆبایل و پاوەر بانک"
                ]
            },
            {
                q: "بۆچی کارەبای نیشتمانی لە ساڵی ٢٠٢٦ دا مایەی پێکەنین بوو؟",
                a: [
                    "کردیانە ٢٤ سەعاتی و نەشبوو",
                    "چونکە سەری نەگرت پرۆژەکە هیهی",
                    "چونکە بەقەد نوکتەیەک کورت بوو",
                    "چونکە مایەی پێکەنینە",
                    "چونکە زۆر جوان سەری گرت",
                    "چونکە پڕۆژەی تاریکی بوو"
                ]
            },
            {
                q: "تانکەکانی سەر سنوور بۆچی ڕاوەستابوون و نەدەجوڵان؟",
                a: [
                    "بەنزینیان نەمابوو",
                    "چونکە تانکی ناجولێ",
                    "بەڕۆژی بوون",
                    "غازیان تێدانەبوو چونکە گرانی بوو",
                    "جەویان هەبوو"
                ]
            },
            {
                q: "خوێندکارێکی زانکۆ کاتێک کارەبا دەبڕا و دەوامیش نەبوو، چی کرد بۆ ئەوەی خۆی بغافڵێنێت؟",
                a: [
                    "کاشی ماڵێ دەژمێریت",
                    "لەگەل خۆی قسەی دەکرد",
                    "ڕەحمەتی لۆ وەزیر و کردنە عوتڵەی دەنارد",
                    "پسیارینگۆی جواب دەداوە",
                    "موشەکاکانمان دەژمارد"
                ]
            },
            {
                q: "بۆچی ئەو موشەکانەی دەگیرانە کوردستان لەشوێنی هەڵە بە ئەرز دەکەوت؟",
                a: [
                    "چونکە چاویان زەعیف بوو",
                    "کابرا چاوی خێل بو",
                    "تا بزانن خەڵکەکەی ئەترسن یان نا",
                    "لەبەرئەوەی موشکەکە ماندی بوو",
                    "تا بە چاوەجوانەکانی یار نەکەوێ",
                    "لەبەرەوەی ئەمە قەشمەڕین"
                ]
            },
            {
                q: "خەڵکی لە کاتی شەڕدا کە کارەبا نییە، گۆشت و خواردنە ساردەکانیان چۆن لە تێکچوون دەپارێزن؟",
                a: [
                    "نیمانە تا بیپارێزین",
                    "لەدەرێ دادەنێن دونیا ساردە",
                    "لە ناو مەعیدەی تێکناچی"
                ]
            },
            {
                q: "بۆچی خەڵک وردە وردە چاویان گۆڕا و بوبوون بە کوندەپەپوو؟",
                a: [
                    "کارەبا نەبوو",
                    "چونکە تاریکستان بو",
                    "بەوخوایەی نازانم چ جوابدەمۆ",
                    "پرسیارەکەت جوانە بەس دەقیق نییە"
                ]
            },
            {
                q: "نیشانەی کۆتایی هاتنی جەنگ چییە؟",
                a: [
                    "دکتۆر رەشاد دەڵێ یەڵە وەرنەوە ئیمتیحانە",
                    "ئەمن مێردی بکەم",
                    "کارەبا بێتەوە",
                    "کوردستان ببتە دەوڵەت",
                    "ترامپ بکەوتە هەوایێ بفری",
                    "ئەندۆمی و سپاگێتی ٤ی ببتەوە هەزار",
                    "دەوام بێتەوە",
                    "هاتنی دەجالی",
                    "یەئجوج و مەئجوج"
                ]
            }
        ];

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // دەستپێکردن بە کلیک
        document.getElementById('startBtn').addEventListener('click', () => {
            bgMusic.play().catch(e => console.log("Music play blocked:", e));
            
            showScreen('screen-welcome');
            
            // مانەوە لەسەر شاشەی بەخێرهاتن بۆ ٤ چرکە، پاشان چوون بۆ پرسیارەکان
            setTimeout(() => {
                showScreen('screen-qa');
                startShowSequence(0);
            }, 4000);
        });

        // فەنکشنی سەرەکی بۆ پیشاندانی پرسیار
        function startShowSequence(qIndex) {
            // ئەگەر پرسیارەکان تەواو بوون
            if (qIndex >= data.length) {
                showScreen('screen-end');
                return;
            }

            const currentData = data[qIndex];
            
            // دانانی دەقی پرسیار و شاردنەوەی کۆمێنت
            document.getElementById('qCounter').textContent = `پرسیاری ${qIndex + 1} / 10`;
            document.getElementById('displayQuestion').textContent = `${qIndex + 1}. ${currentData.q}`;
            
            const commentBox = document.getElementById('displayComment');
            commentBox.classList.remove('pop-in'); // شاردنەوەی کۆمێنت
            
            // چاوەڕێکردنی ٨ چرکە بۆ خوێندنەوەی پرسیارەکە
            setTimeout(() => {
                showCommentsSequence(qIndex, 0);
            }, 8000);
        }

        // فەنکشن بۆ پیشاندانی کۆمێنتەکان یەک بە یەک
        function showCommentsSequence(qIndex, cIndex) {
            const currentData = data[qIndex];
            
            // ئەگەر کۆمێنتەکانی ئەم پرسیارە تەواو بوون، بڕۆ پرسیاری داهاتوو
            if (cIndex >= currentData.a.length) {
                startShowSequence(qIndex + 1);
                return;
            }

            const commentBox = document.getElementById('displayComment');
            
            // لابردنی ئەنیمەیشنە کۆنەکە بۆ ئەوەی دووبارە دەست پێبکاتەوە
            commentBox.classList.remove('pop-in');
            
            // نوێکردنەوەی براوزەر بۆ جێبەجێبوونی ئەنیمەیشنەکە (Reflow)
            void commentBox.offsetWidth; 
            
            // دانانی دەقی کۆمێنتە نوێیەکە و کارپێکردنی ئەنیمەیشن
            commentBox.textContent = currentData.a[cIndex];
            commentBox.classList.add('pop-in');

            // چاوەڕێکردنی ٥ چرکە بۆ هەر کۆمێنتێک
            setTimeout(() => {
                showCommentsSequence(qIndex, cIndex + 1);
            }, 5000);
        }
    </script>
</body>
</html>
